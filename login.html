<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Patitas Sanas</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=IBM+Plex+Sans:wght@500;700&display=swap" rel="stylesheet">
    <script src="supabase-client.js" defer></script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Patitas<span> Sanas</span></h1>
            <p>Portal de Acceso</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="switchTab('register')">Registrarse</div>
        </div>

        <div id="login-form" class="form-box active">
            <p id="login-error" class="error-msg">Correo o contraseña incorrectos.</p>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <a href="index.html" class="back-home">← Volver al inicio</a>
        </div>

        <div id="register-form" class="form-box">
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Tu Nombre Completo</label>
                    <input type="text" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label>Nombre de tu Mascota</label>
                    <input type="text" placeholder="Ej. Toby" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Crear Contraseña</label>
                    <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn-submit" style="background-color: var(--accent-color);">Crear Cuenta</button>
            </form>
            <a href="index.html" class="back-home">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // Cambiar entre Iniciar Sesión y Registro
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
            document.getElementById('login-error').style.display = 'none';

            if (tabName === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Simulación de Base de Datos Local para Roles Administrativos
        function handleLogin(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const password = document.getElementById('login-password').value.trim();
            const errorMsg = document.getElementById('login-error');

            errorMsg.style.display = 'none';

            // Regla 1: Veterinario
            if (email === 'vet@gmail.com' && password === '12345') {
                window.location.href = 'dashboard-vet.html';
            } 
            // Regla 2: Recepción
            else if (email === 'rec@gmail.com' && password === '12345') {
                window.location.href = 'dashboard-recepcion.html';
            } 
            // Regla 3: Si se equivoca de contraseña en las cuentas de admin
            else if ((email === 'vet@gmail.com' || email === 'rec@gmail.com') && password !== '12345') {
                errorMsg.style.display = 'block';
            }
            // Regla 4: Cualquier otro correo es tratado como Paciente/Cliente
            else {
                window.location.href = 'citas.html';
            }
        }

        // Registro de un nuevo usuario en Supabase Authentication
        async function handleRegister(e) {
            e.preventDefault(); 

            // Extrae los valores usando los ID que acabamos de agregar al HTML
            const email = document.getElementById('register-email').value.toLowerCase().trim();
            const password = document.getElementById('register-password').value.trim();

            try {
                // Llamamos a la función signUp que creaste en tu supabase-client.js
                const { user, error } = await supabase.signUp(email, password);

                if (error) {
                    alert('Error al registrarse: ' + (error.message || 'Verifica tus datos'));
                    return;
                }

                alert('¡Cuenta creada con éxito en Supabase! Ya puedes iniciar sesión.');
                window.location.href = 'login.html'; 

            } catch (err) {
                console.error('Error inesperado en el registro:', err);
                alert('Hubo un problema de conexión con el servidor.');
            }
        }
    </script>
</body>
</html>
